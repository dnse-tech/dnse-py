name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - name: Compile-check examples
        run: |
          python -m py_compile examples/quickstart.py
          python -m py_compile examples/use-cases/portfolio-check.py
          python -m py_compile examples/use-cases/place-a-trade.py
          python -m py_compile examples/use-cases/order-history.py
          python -m py_compile examples/use-cases/market-data.py
          python -m py_compile examples/reference/accounts.py
          python -m py_compile examples/reference/orders.py
          python -m py_compile examples/reference/deals.py
          python -m py_compile examples/reference/market.py
          python -m py_compile examples/reference/market-stream.py
          python -m py_compile examples/reference/trading-stream.py
          python -m py_compile examples/reference/async-client.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen
      - run: uv run pytest --cov=dnse --cov-report=xml --cov-fail-under=80

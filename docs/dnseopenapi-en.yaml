openapi: 3.0.0
info:
  title: DNSE-OpenAPI-V2
  version: 1.0.0
  description: DNSE OpenAPI spec and tests
servers:
  - url: https://openapi-uat.dnse.com.vn
paths:
  /registration/send-email-otp:
    post:
      summary: Gửi Email OTP
      parameters:
        - name: X-API-Key
          in: header
          required: true
          description: API Key được cấp khi đăng ký dịch vụ
          deprecated: false
          schema:
            type: string
          example: '{{apiKey}}'
        - name: X-Aux-Date
          in: header
          required: true
          description: Thời gian thực hiện yêu cầu
          deprecated: false
          schema:
            type: string
          example: '{{date}}'
        - name: X-Signature
          in: header
          required: true
          description: Chữ ký xác thực yêu cầu
          deprecated: false
          schema:
            type: string
          example: '{{signature}}'
      responses:
        '200':
          description: OK
          headers:
            Content-Length:
              schema:
                type: integer
              example: '46'
            Date:
              schema:
                type: string
              example: Wed, 18 Mar 2026 16:14:37 GMT
            Vary:
              schema:
                type: string
              example: Origin
            X-Frame-Options:
              schema:
                type: string
              example: GOFORIT
            X-Ratelimit-Limit:
              schema:
                type: integer
              example: '300'
            X-Ratelimit-Remaining:
              schema:
                type: integer
              example: '298'
            X-Ratelimit-Reset:
              schema:
                type: integer
              example: '1773936838'
            X-Request-Id:
              schema:
                type: string
              example: WlnjbiWRMdBEaTGsYcNlhJJpVYYYnKDH
            X-Tyk-Api-Expires:
              schema:
                type: string
              example: Thu, 02 Jan 3000 15:04:00 UTC
        '400':
          description: Yêu cầu không hợp lệ
          headers:
            Content-Length:
              deprecated: false
              schema: {}
              example: '103'
            Date:
              deprecated: false
              schema: {}
              example: Wed, 25 Mar 2026 15:16:09 GMT
            Vary:
              deprecated: false
              schema: {}
              example: Origin
            X-Frame-Options:
              deprecated: false
              schema: {}
              example: GOFORIT
            X-Ratelimit-Limit:
              deprecated: false
              schema: {}
              example: '300'
            X-Ratelimit-Remaining:
              deprecated: false
              schema: {}
              example: '299'
            X-Ratelimit-Reset:
              deprecated: false
              schema: {}
              example: '1774451769'
            X-Request-Id:
              deprecated: false
              schema: {}
              example: GBYpVgOHmLiupqdCDREhVXzQznODUEpU
            X-Tyk-Api-Expires:
              deprecated: false
              schema: {}
              example: Thu, 02 Jan 3000 15:04:00 UTC
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    format: int32
                    example: 400
                    description: Mã HTTP
                  code:
                    type: string
                    example: OA-100
                    description: Mã lỗi
                  message:
                    type: string
                    example: >-
                      Invalid input: email otp is not registered for this
                      account
                    description: Thông điệp lỗi
              example:
                status: 400
                code: OA-100
                message: 'Invalid input: email otp is not registered for this account'
        '500':
          description: Lỗi hệ thống
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    format: int32
                    example: 500
                    description: Mã HTTP
                  code:
                    type: string
                    example: OA-009
                    description: Mã lỗi
                  message:
                    type: string
                    example: Lỗi hệ thống
                    description: Thông điệp lỗi
              example:
                code: OA-009
                message: Lỗi hệ thống
                status: 500
      tags:
        - trading
  /registration/trading-token:
    post:
      summary: Xác thực OTP
      parameters:
        - name: X-API-Key
          in: header
          required: true
          description: API Key được cấp khi đăng ký dịch vụ
          deprecated: false
          schema:
            type: string
          example: '{{apiKey}}'
        - name: X-Aux-Date
          in: header
          required: true
          description: Thời gian thực hiện yêu cầu
          deprecated: false
          schema:
            type: string
          example: '{{date}}'
        - name: X-Signature
          in: header
          required: true
          description: Chữ ký xác thực yêu cầu
          deprecated: false
          schema:
            type: string
          example: '{{signature}}'
      responses:
        '200':
          description: OK
          headers:
            Content-Length:
              deprecated: false
              schema: {}
              example: '56'
            Date:
              deprecated: false
              schema: {}
              example: Wed, 18 Mar 2026 16:15:18 GMT
            Vary:
              deprecated: false
              schema: {}
              example: Origin
            X-Frame-Options:
              deprecated: false
              schema: {}
              example: GOFORIT
            X-Ratelimit-Limit:
              deprecated: false
              schema: {}
              example: '300'
            X-Ratelimit-Remaining:
              deprecated: false
              schema: {}
              example: '299'
            X-Ratelimit-Reset:
              deprecated: false
              schema: {}
              example: '1773850517'
            X-Request-Id:
              deprecated: false
              schema: {}
              example: MnbLxZrRhSMHnXlfhYjjIswAMGqYVlzb
            X-Tyk-Api-Expires:
              deprecated: false
              schema: {}
              example: Thu, 02 Jan 3000 15:04:00 UTC
          content:
            application/json:
              schema:
                type: object
                properties:
                  tradingToken:
                    type: string
                    example: 9ab81e9c-8a81-45aa-8190-b69a1c179d52
                    description: Token đặt lệnh
              example:
                tradingToken: 9ab81e9c-8a81-45aa-8190-b69a1c179d52
        '400':
          description: Yêu cầu không hợp lệ
          headers:
            Content-Length:
              deprecated: false
              schema: {}
              example: '101'
            Date:
              deprecated: false
              schema: {}
              example: Wed, 25 Mar 2026 15:23:56 GMT
            Vary:
              deprecated: false
              schema: {}
              example: Origin
            X-Frame-Options:
              deprecated: false
              schema: {}
              example: GOFORIT
            X-Ratelimit-Limit:
              deprecated: false
              schema: {}
              example: '300'
            X-Ratelimit-Remaining:
              deprecated: false
              schema: {}
              example: '298'
            X-Ratelimit-Reset:
              deprecated: false
              schema: {}
              example: '1774538632'
            X-Request-Id:
              deprecated: false
              schema: {}
              example: xrKYIYrVUPtXbYRUbeapUatkUHeliXhh
            X-Tyk-Api-Expires:
              deprecated: false
              schema: {}
              example: Thu, 02 Jan 3000 15:04:00 UTC
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    format: int32
                    example: 400
                    description: Mã HTTP
                  code:
                    type: string
                    example: OA-100
                    description: Mã lỗi
                  message:
                    type: string
                    example: 'Invalid input: otpType is not registered for this account'
                    description: Thông điệp lỗi
              example:
                status: 400
                code: OA-100
                message: 'Invalid input: otpType is not registered for this account'
        '500':
          description: Lỗi hệ thống
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    format: int32
                    example: 500
                    description: Mã HTTP
                  code:
                    type: string
                    example: OA-009
                    description: Mã lỗi
                  message:
                    type: string
                    example: Lỗi hệ thống
                    description: Thông điệp lỗi
              example:
                code: OA-009
                message: Lỗi hệ thống
                status: 500
      tags:
        - trading
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                otpType:
                  type: string
                  example: email_otp
                  description: >-
                    Phương thức xác thực OTP

                    - email_otp: Áp dụng cho tài khoản đăng ký phương thức xác
                    thực lớp thứ 2 là Email OTP

                    - smart_otp: Áp dụng cho tài khoản đăng ký phương thức xác
                    thực lớp thứ 2 là Smart OTP
                passcode:
                  type: string
                  example: '519752'
                  description: Mã OTP tương ứng với phương thức xác thực
            example:
              otpType: email_otp
              passcode: '569542'
  /accounts/orders:
    post:
      summary: Đặt lệnh
      parameters:
        - name: marketType
          in: query
          required: true
          description: |-
            Loại thị trường 
            - STOCK: Đặt lệnh cơ sở
            - DERIVATIVE: Đặt lệnh phái sinh
          deprecated: false
          schema:
            type: string
          example: DERIVATIVE
        - name: orderCategory
          in: query
          required: true
          description: Phân loại lệnh thường, lệnh điều kiện (mặc định NORMAL)
          deprecated: false
          schema:
            type: string
          example: NORMAL
        - name: X-API-Key
          in: header
          required: true
          description: API Key được cấp khi đăng ký dịch vụ
          deprecated: false
          schema:
            type: string
          example: '{{apiKey}}'
        - name: X-Signature
          in: header
          required: true
          description: Chữ ký xác thực yêu cầu
          deprecated: false
          schema:
            type: string
          example: '{{signature}}'
        - name: X-Aux-Date
          in: header
          required: true
          description: Thời gian thực hiện yêu cầu
          deprecated: false
          schema:
            type: string
          example: '{{date}}'
        - name: trading-token
          in: header
          required: true
          description: Token đặt lệnh
          deprecated: false
          schema:
            type: string
          example: '{{tradingToken}}'
      responses:
        '200':
          description: OK
          headers:
            Content-Length:
              schema:
                type: integer
              example: '487'
            Date:
              schema:
                type: string
              example: Tue, 24 Mar 2026 04:09:50 GMT
            Vary:
              schema:
                type: string
              example: Origin
            X-Ratelimit-Limit:
              schema:
                type: integer
              example: '-1'
            X-Ratelimit-Remaining:
              schema:
                type: integer
              example: '0'
            X-Ratelimit-Reset:
              schema:
                type: integer
              example: '0'
            X-Tyk-Api-Expires:
              schema:
                type: string
              example: Thu, 02 Jan 3000 15:04:00 UTC
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int32
                    example: 1626
                    description: Id lệnh giao dịch
                  symbol:
                    type: string
                    example: 41I1G4000
                    description: Mã chứng khoán
                  side:
                    type: string
                    example: NS
                    description: |-
                      Chiều đặt lệnh
                      NB: Mua
                      NS: Bán
                  orderType:
                    type: string
                    example: LO
                    description: |-
                      Loại lệnh
                      - LO: Lệnh giới hạn
                      - MOK/MAK/MTL: Lệnh thị trường
                      - ATO/ATC: Lệnh phiên định kỳ mở cửa/đóng cửa
                      - PLO: Lệnh khớp lệnh sau giờ
                  orderStatus:
                    type: string
                    example: Pending
                    description: |-
                      Trạng thái lệnh
                      - PendingNew: Chờ gửi
                      - New: Chờ khớp
                      - PendingReplace: Chờ sửa
                      - PartiallyFilled: Khớp một phần
                      - Filled: Khớp toàn bộ
                      - Canceled: Đã hủy
                      - Rejected: Bị từ chối
                      - Expired: Hết hạn trong phiên
                      - DoneForDay: Giải tỏa trong phiên
                  price:
                    type: number
                    format: double
                    example: 1861.5
                    description: Giá đặt
                  averagePrice:
                    type: integer
                    format: int32
                    example: 0
                    description: Giá khớp trung bình
                  quantity:
                    type: integer
                    format: int32
                    example: 3
                    description: Khối lượng đặt
                  fillQuantity:
                    type: integer
                    format: int32
                    example: 0
                    description: Khối lượng khớp
                  canceledQuantity:
                    type: integer
                    format: int32
                    example: 0
                    description: Khối lượng đã hủy
                  leaveQuantity:
                    type: integer
                    format: int32
                    example: 3
                    description: Khối lượng còn lại
                  accountNo:
                    type: string
                    example: '0001179019'
                    description: Số tiểu khoản
                  marketType:
                    type: string
                    example: DERIVATIVE
                    description: |-
                      Loại thị trường
                      - STOCK: Lệnh cơ sở
                      - DERIVATIVE: Lệnh phái sinh
                  orderCategory:
                    type: string
                    example: NORMAL
                    description: Phân loại lệnh thường (mặc định NORMAL)
                  transDate:
                    type: string
                    example: '2026-03-16'
                    description: Ngày giao dịch
                  createdDate:
                    type: string
                    format: date-time
                    example: '2026-03-24T04:09:50.761146893Z'
                    description: Thời điểm tạo
                  modifiedDate:
                    type: string
                    format: date-time
                    example: '2026-03-24T04:09:50.761151529Z'
                    description: Thời điểm cập nhật
              example:
                id: 1626
                symbol: 41I1G4000
                side: NS
                orderType: LO
                orderStatus: Pending
                price: 1861.5
                averagePrice: 0
                quantity: 3
                fillQuantity: 0
                canceledQuantity: 0
                leaveQuantity: 3
                accountNo: '0001179019'
                marketType: DERIVATIVE
                orderCategory: NORMAL
                transDate: '2026-03-16'
                createdDate: '2026-03-24T04:09:50.761146893Z'
                modifiedDate: '2026-03-24T04:09:50.761151529Z'
        '400':
          description: Yêu cầu không hợp lệ
          headers:
            Content-Length:
              deprecated: false
              schema: {}
              example: '86'
            Date:
              deprecated: false
              schema: {}
              example: Wed, 25 Mar 2026 15:28:31 GMT
            Vary:
              deprecated: false
              schema: {}
              example: Origin
            X-Ratelimit-Limit:
              deprecated: false
              schema: {}
              example: '-1'
            X-Ratelimit-Remaining:
              deprecated: false
              schema: {}
              example: '0'
            X-Ratelimit-Reset:
              deprecated: false
              schema: {}
              example: '0'
            X-Tyk-Api-Expires:
              deprecated: false
              schema: {}
              example: Thu, 02 Jan 3000 15:04:00 UTC
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    format: int32
                    example: 400
                    description: Mã HTTP
                  code:
                    type: string
                    example: STOCK_PRICE_UNDEFINED
                    description: Mã lỗi
                  message:
                    type: string
                    example: Cannot determine stock price
                    description: Thông điệp lỗi
              example:
                status: 400
                code: STOCK_PRICE_UNDEFINED
                message: Cannot determine stock price
        '500':
          description: Lỗi hệ thống
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    format: int32
                    example: 500
                    description: Mã HTTP
                  code:
                    type: string
                    example: OA-009
                    description: Mã lỗi
                  message:
                    type: string
                    example: Lỗi hệ thống
                    description: Thông điệp lỗi
              example:
                code: OA-009
                message: Lỗi hệ thống
                status: 500
      tags:
        - trading
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accountNo:
                  type: string
                  example: '0001179019'
                  description: Số tiểu khoản
                loanPackageId:
                  type: integer
                  format: int32
                  example: 2278
                  description: Id gói vay
                orderType:
                  type: string
                  example: LO
                  description: |-
                    Loại lệnh
                    - LO: Lệnh giới hạn
                    - MOK/MAK/MTL: Lệnh thị trường
                    - ATO/ATC: Lệnh phiên định kỳ mở cửa/đóng cửa
                    - PLO: Lệnh khớp lệnh sau giờ
                price:
                  type: number
                  format: double
                  example: 35000
                  description: Giá đặt lệnh
                quantity:
                  type: integer
                  format: int32
                  example: 300
                  description: Khối lượng đặt lệnh
                side:
                  type: string
                  example: NB
                  description: |-
                    Loại lệnh
                    - NB: Mua
                    - NS: Bán
                symbol:
                  type: string
                  example: TCB
                  description: Mã chứng khoán
            example:
              accountNo: '0001179019'
              loanPackageId: 2278
              orderType: LO
              price: 1861.5
              quantity: 3
              side: NS
              symbol: 41I1G4000

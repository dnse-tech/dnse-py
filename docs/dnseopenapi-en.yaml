info:
    description: DNSE OpenAPI spec and tests
    title: DNSE OpenAPI
    version: v1.0.0
openapi: 3.0.0
paths:
    /price/secdef/{symbol}:
        get:
            operationId: getSecdef
            parameters:
                - $ref: '#/components/parameters/BoardIdQuery'
                - $ref: '#/components/parameters/SymbolPath'
                - $ref: '#/components/parameters/XApiKeyHeader'
                - $ref: '#/components/parameters/DateHeader'
                - $ref: '#/components/parameters/SignatureHeader'
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SecurityDefinitionResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        description: Error code
                                        example: OA-003
                                        type: string
                                    message:
                                        description: Error message
                                        example: Invalid input
                                        type: string
                                    status:
                                        description: HTTP code
                                        example: 400
                                        format: int32
                                        type: integer
                                type: object
                    description: Invalid request
                "500":
                    content:
                        application/json:
                            schema:
                                properties:
                                    code:
                                        description: Error code
                                        example: OA-009
                                        type: string
                                    message:
                                        description: Error message
                                        example: Internal server error
                                        type: string
                                    status:
                                        description: HTTP code
                                        example: 500
                                        format: int32
                                        type: integer
                                type: object
                    description: Internal server error
            servers:
                - url: https://openapi-uat.dnse.com.vn
            summary: Stock information
            tags:
                - market-data
    /registration/send-email-otp:
        post:
            operationId: sendEmailOtp
            parameters:
                - $ref: '#/components/parameters/XApiKeyHeader'
